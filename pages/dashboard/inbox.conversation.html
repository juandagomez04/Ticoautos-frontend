<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos | Conversación</title>

    <link rel="stylesheet" href="../../css/base/global.css">
    <link rel="stylesheet" href="../../css/dashboard/inbox.css">
</head>

<body>
    <header class="topbar">
        <div class="container navbar">
            <a href="../public/home.html" class="brand">
                <img src="../../img/logo.png" alt="TicoAutos logo" class="logo">
            </a>
            
            <nav class="nav-links">
                <a href="./dashboard.html">Dashboard</a>
                <a href="./vehicle.my.html">Mis vehículos</a>
                <a href="./vehicle.create.html">Publicar</a>
                <a href="./inbox.list.html" class="active">Inbox</a>
                <a href="../auth/login.html" id="logoutLink">Cerrar sesión</a>
            </nav>
        </div>
    </header>

    <main class="container conversation-page">
        <section class="breadcrumb">
            <a href="./inbox.list.html">Inbox</a>
            <span>/</span>
            <span>Conversación</span>
        </section>

        <section class="conversation-layout">
            <aside class="card conversation-side">
                <span class="page-tag">Detalle</span>
                <h1 id="vehicleTitle">Vehículo</h1>
                <p id="vehicleMeta">Consulta del comprador</p>

                <div class="conversation-meta">
                    <div class="meta-row">
                        <span>Estado</span>
                        <strong id="conversationStatus">Pendiente</strong>
                    </div>
                    <div class="meta-row">
                        <span>Comprador</span>
                        <strong id="buyerName">Usuario</strong>
                    </div>
                    <div class="meta-row">
                        <span>Fecha pregunta</span>
                        <strong id="questionDate">-</strong>
                    </div>
                    <div class="meta-row">
                        <span>Fecha respuesta</span>
                        <strong id="answerDate">-</strong>
                    </div>
                </div>

                <a href="./inbox.list.html" class="btn btn-secondary full-btn">Volver al inbox</a>
            </aside>

            <section class="card conversation-main">
                <div class="panel-head">
                    <h2>Historial</h2>
                </div>

                <div class="messages-box" id="messagesBox"></div>

                <form id="answerForm" class="answer-form">
                    <label for="answerText">Responder pregunta</label>
                    <textarea id="answerText" placeholder="Escribe una respuesta clara para el comprador..."></textarea>
                    <div class="answer-actions">
                        <button type="submit" class="btn btn-primary">Enviar respuesta</button>
                    </div>
                </form>

                <div class="form-message hidden" id="formMessage"></div>
            </section>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>TicoAutos © 2026 - Conversación de consulta</p>
        </div>
    </footer>

    <script type="module" src="../../js/dashboard/inbox.conversation.js"></script>
</body>

</html>

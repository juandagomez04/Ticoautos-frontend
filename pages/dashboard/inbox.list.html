<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos | Inbox</title>

    <link rel="stylesheet" href="../../css/base/global.css">
    <link rel="stylesheet" href="../../css/dashboard/inbox.css">
</head>

<body>
    <header class="topbar">
        <div class="container navbar">
            <a href="../public/home.html" class="brand">
                <img src="../../img/logo.png" alt="TicoAutos logo" class="logo">
            </a>
            
            <nav class="nav-links">
                <a href="./dashboard.html">Dashboard</a>
                <a href="./vehicle.my.html">Mis vehículos</a>
                <a href="./vehicle.create.html">Publicar</a>
                <a href="./inbox.list.html" class="active">Inbox</a>
                <a href="../auth/login.html" id="logoutLink">Cerrar sesión</a>
            </nav>
        </div>
    </header>

    <main class="container inbox-page">
        <section class="card inbox-hero">
            <div>
                <span class="page-tag">Mensajería</span>
                <h1>Inbox de consultas</h1>
                <p>
                    Revisa preguntas sobre tus vehículos y accede al historial de conversación.
                </p>
            </div>
        </section>

        <section class="card inbox-toolbar">
            <div class="toolbar-grid">
                <div class="input-group">
                    <label for="searchConversation">Buscar</label>
                    <input type="text" id="searchConversation" placeholder="Buscar por vehículo o usuario">
                </div>

                <div class="input-group">
                    <label for="statusFilter">Estado</label>
                    <select id="statusFilter">
                        <option value="">Todos</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="respondida">Respondida</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="inbox-list" id="conversationList"></section>

        <section class="card empty-state hidden" id="emptyState">
            <h3>No hay conversaciones para mostrar</h3>
            <p>Prueba ajustando los filtros o espera nuevas consultas.</p>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>TicoAutos © 2026 - Inbox de consultas</p>
        </div>
    </footer>

    <script type="module" src="../../js/dashboard/inbox.list.js"></script>
</body>

</html>

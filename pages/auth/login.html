<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login - TicoAutos</title>
    <link rel="stylesheet" href="../../css/base/reset.css" />
    <link rel="stylesheet" href="../../css/base/main.css" />
    <link rel="stylesheet" href="../../css/auth/auth.css" />
</head>

<body>
    <main class="card">
        <h1>Iniciar sesión</h1>

        <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Ingrese su email" required />

            <label for="password">Contraseña</label>
            <input id="password" type="password" placeholder="Ingrese su contraseña" required />

            <button type="submit">Entrar</button>
        </form>

        <p id="msg"></p>
        <p>¿No tienes cuenta? <a href="./register.html">Regístrate</a></p>
    </main>

    <script type="module" src="../../js/auth/login.js"></script>
</body>

</html>
